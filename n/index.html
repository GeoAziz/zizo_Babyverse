<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zizo's BabyVerse - Coming Soon!</title>
    <style media="screen">
      body { background: #ECEFF1; color: rgba(0,0,0,0.87); font-family: 'Space Grotesk', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
      #message { background: white; max-width: 500px; margin: 16px; padding: 32px 24px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
      #message h1 { font-size: 2.5rem; color: #2C3E50; /* Primary color */ margin: 0 0 16px; }
      #message p { line-height: 1.6; margin: 16px 0 24px; font-size: 1.1rem; color: #34495E; /* Muted foreground */ }
      #message img { max-width: 100px; margin-bottom: 20px; border-radius: 50%; box-shadow: 0 0 10px #8E44AD; /* Accent color shadow */ }
      .rocket { font-size: 3rem; margin-bottom: 1rem; display: inline-block; animation: takeOff 2s ease-in-out infinite alternate; }
      @keyframes takeOff {
        0% { transform: translateY(0); }
        100% { transform: translateY(-10px); }
      }
    </style>
  </head>
  <body>
    <div id="message">
      <div class="rocket">🚀</div>
      <img src="https://placehold.co/100x100.png" alt="Zizo's BabyVerse Logo" data-ai-hint="futuristic logo">
      <h1>Zizo's BabyVerse is Gearing Up!</h1>
      <p>Our cosmic team is working hard to bring you an unparalleled baby product experience. Prepare for an adventure into a new dimension of parenting.</p>
      <p><strong>Stay tuned for launch!</strong></p>
    </div>
  </body>
</html>
