# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
# Firebase App Hosting automatically detects Next.js and uses appropriate build/run commands.
# If you need custom build steps, you can add a `build` section.
# https://firebase.google.com/docs/app-hosting/configure-backend#build

# Environment variables sourced from Google Secret Manager
# Create these secrets in Secret Manager and grant the App Hosting service account
# the "Secret Manager Secret Accessor" role for each.
env:
  - variable: DATABASE_URL
    secret: PROD_DATABASE_URL # Replace with the name of your secret in Secret Manager
  - variable: NEXTAUTH_SECRET
    secret: PROD_NEXTAUTH_SECRET # Replace with the name of your secret
  - variable: NEXTAUTH_URL
    secret: PROD_NEXTAUTH_URL # Replace with the name of your secret (this will be your deployed app's URL)
  # Add other necessary environment variables here, e.g., for your GenAI provider
  # - variable: GOOGLE_API_KEY
  #   secret: PROD_GOOGLE_API_KEY
  # Ensure Genkit can access Google AI services, typically via Application Default Credentials
  # if the service account has the 'Vertex AI User' or 'AI Platform User' role.
